name: Production Check

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  prod_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production readiness check
        run: npm run prod:check

