name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure GitHub Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const apiVersion = "2022-11-28";
            const pagesUrl = `https://github.com/${owner}/${repo}/settings/pages`;

            try {
              const site = await github.request("GET /repos/{owner}/{repo}/pages", {
                owner,
                repo,
                headers: { "X-GitHub-Api-Version": apiVersion },
              });
              const buildType = site?.data?.build_type || "unknown";
              core.info(`Pages site found (build_type=${buildType}).`);
              if (buildType !== "workflow") {
                core.warning(
                  `Pages build_type is '${buildType}'. If deploy fails, set Source to GitHub Actions at ${pagesUrl}`
                );
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.warning("Pages site not found. Attempting to create with build_type=workflow.");
              try {
                await github.request("POST /repos/{owner}/{repo}/pages", {
                  owner,
                  repo,
                  build_type: "workflow",
                  headers: { "X-GitHub-Api-Version": apiVersion },
                });
                core.info("Pages site created.");
              } catch (createError) {
                const status = createError.status || "unknown";
                const detail = createError.message || String(createError);
                core.setFailed(
                  `Pages is not enabled and auto-enable failed (status=${status}). ` +
                  `Open ${pagesUrl} and set Source to GitHub Actions. Details: ${detail}`
                );
              }
            }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run ci

      - name: Prepare static artifact
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'supabase/' \
            --exclude '*.md' \
            --exclude '.eslintrc.cjs' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            ./ dist/
          short_sha="$(echo "$GITHUB_SHA" | cut -c1-12)"
          built_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          printf '{\n  "version": "%s",\n  "built_at": "%s"\n}\n' \
            "$short_sha" \
            "$built_at" > dist/build-meta.json
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
